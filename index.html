<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>🎙️ 语音聊天</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#1a1a2e;color:#e0e0e0;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{background:#16213e;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #0f3460;flex-shrink:0}
.header h1{font-size:18px;font-weight:600;flex:1}
.header .status{font-size:12px;color:#8892b0;display:flex;align-items:center;gap:4px}
.header .settings-btn{background:none;border:none;color:#8892b0;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.header .settings-btn:active{background:rgba(255,255,255,.1)}
.header .status .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block}
.header .status .dot.busy{background:#fbbf24}
.header .status .dot.off{background:#ef4444}

.chat-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:#0f3460;border-radius:2px}

.bubble{max-width:82%;display:flex;flex-direction:column;gap:4px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble.self{align-self:flex-end;align-items:flex-end}
.bubble.other{align-self:flex-start;align-items:flex-start}
.bubble .voice-card{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:opacity .15s;user-select:none;-webkit-tap-highlight-color:transparent;min-width:80px}
.bubble.self .voice-card{background:#0f3460;border-bottom-right-radius:3px}
.bubble.other .voice-card{background:#16213e;border-bottom-left-radius:3px}
.bubble .voice-card:active{opacity:.7}
.bubble .voice-card .speaker{font-size:14px;flex-shrink:0;line-height:1}
.bubble .voice-card .wave{display:flex;align-items:center;gap:1.5px;height:14px;flex:1}
.bubble .voice-card .wave .bar{width:2px;border-radius:2px;background:currentColor}
.bubble .voice-card .duration{font-size:11px;color:#8892b0;white-space:nowrap;min-width:20px;text-align:right}
.bubble .transcript{font-size:11px;color:#8892b0;padding:0 2px;max-width:100%;word-break:break-all;line-height:1.3}
.bubble.self .transcript{text-align:right}

/* ===== 底部录音栏 ===== */
.recorder-bar{flex-shrink:0;padding:16px 16px calc(16px + env(safe-area-inset-bottom,0px));background:#16213e;border-top:1px solid #0f3460;display:flex;flex-direction:column;align-items:center;gap:10px}
.recorder-bar .record-btn{width:72px;height:72px;border-radius:50%;border:3px solid #4ade80;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s ease;-webkit-tap-highlight-color:transparent;touch-action:none;position:relative}
.recorder-bar .record-btn .mic{font-size:30px;transition:transform .25s ease}
.recorder-bar .record-btn .rec-time{position:absolute;top:4px;right:4px;font-size:11px;color:#ef4444;font-variant-numeric:tabular-nums;white-space:nowrap;background:rgba(26,26,46,.7);padding:1px 5px;border-radius:6px}
.recorder-bar .record-btn.recording{border-color:#ef4444;background:rgba(239,68,68,.12);transform:scale(1.08)}
.recorder-bar .record-btn.recording .mic{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.recorder-bar .hint{font-size:13px;color:#8892b0;transition:color .2s;text-align:center;min-height:20px}
.recorder-bar .hint.recording{color:#ef4444}
.recorder-bar .hint.processing{color:#fbbf24}

/* ===== 预览面板 ===== */
.preview-panel{display:none;flex-direction:column;align-items:center;gap:12px;width:100%}
.preview-panel.show{display:flex}
.preview-panel .preview-info{display:flex;align-items:center;gap:10px;color:#e0e0e0;font-size:14px}
.preview-panel .preview-info .play-preview{width:40px;height:40px;border-radius:50%;border:2px solid #4ade80;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.preview-panel .preview-info .play-preview:active{background:rgba(74,222,128,.15)}
.preview-panel .preview-info .play-preview.playing{border-color:#fbbf24}
.preview-panel .preview-actions{display:flex;gap:16px}
.preview-panel .preview-actions button{padding:8px 24px;border-radius:20px;border:none;font-size:14px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;font-weight:500}
.preview-panel .preview-actions .btn-cancel{background:#3a3a5c;color:#a0a8c0}
.preview-panel .preview-actions .btn-cancel:active{background:#4a4a6c}
.preview-panel .preview-actions .btn-send{background:#4ade80;color:#1a1a2e}
.preview-panel .preview-actions .btn-send:active{background:#3bc86e}

.recorder-bar .rec-mode{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
.recorder-bar .rec-mode.hidden{display:none}

.loading-dots{display:flex;gap:4px;padding:12px 0}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:bounce 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6)}40%{transform:scale(1)}}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:100;animation:toastIn .3s ease;max-width:90%}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#8892b0;gap:8px;text-align:center;padding:40px}
.empty-state .icon{font-size:48px;opacity:.5}
.empty-state p{font-size:14px;line-height:1.6}
/* ===== 设置弹窗 ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#1a1a2e;border:1px solid #0f3460;border-radius:12px;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #0f3460}
.modal-header h2{font-size:15px;font-weight:600}
.modal-header .close-btn{background:none;border:none;color:#8892b0;font-size:20px;cursor:pointer;padding:0 4px}
.modal-body{padding:14px 16px;flex:1;overflow-y:auto}
.modal-body label{display:block;font-size:12px;color:#8892b0;margin-bottom:6px}
.modal-body textarea{width:100%;height:200px;background:#16213e;border:1px solid #0f3460;border-radius:8px;color:#e0e0e0;font-size:13px;padding:10px;resize:vertical;font-family:inherit;line-height:1.5;outline:none}
.modal-body textarea:focus{border-color:#4ade80}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:12px 16px;border-top:1px solid #0f3460}
.modal-footer button{padding:7px 20px;border-radius:16px;border:none;font-size:13px;cursor:pointer;font-weight:500;transition:all .2s}
.modal-footer .btn-cancel{background:#3a3a5c;color:#a0a8c0}
.modal-footer .btn-cancel:active{background:#4a4a6c}
.modal-footer .btn-save{background:#4ade80;color:#1a1a2e}
.modal-footer .btn-save:active{background:#3bc86e}
.modal-footer .btn-save:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>

<div class="header">
  <h1>🎙️ 语音聊天</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">就绪</span>
  </div>
  <button type="button" class="settings-btn" id="newChatBtn" title="新建对话">➕</button>
  <button type="button" class="settings-btn" id="settingsBtn" title="人设提示词">⚙️</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">🎤</div>
    <p>点击下方按钮开始录音<br>再次点击发送</p>
  </div>
</div>

<div class="recorder-bar">
  <div class="rec-mode" id="recMode">
    <div class="hint" id="hintText">点击录音</div>
    <button type="button" class="record-btn" id="recordBtn">
      <span class="mic">🎤</span>
    </button>
  </div>
  <div class="preview-panel" id="previewPanel">
    <div class="preview-info">
      <button type="button" class="play-preview" id="playPreviewBtn">▶️</button>
      <span id="previewDuration">0"</span>
    </div>
    <div class="preview-actions">
      <button type="button" class="btn-cancel" id="cancelBtn">取消</button>
      <button type="button" class="btn-send" id="sendBtn">发送</button>
    </div>
  </div>
</div>

<!-- ===== 设置弹窗 ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙️ 人设提示词</h2>
      <button type="button" class="close-btn" id="modalCloseBtn">✕</button>
    </div>
    <div class="modal-body">
      <label for="promptInput">修改后保存将重置对话历史</label>
      <textarea id="promptInput" spellcheck="false"></textarea>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-cancel" id="modalCancelBtn">取消</button>
      <button type="button" class="btn-save" id="modalSaveBtn">保存</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const chatArea = $("chatArea");
const emptyState = $("emptyState");

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let isProcessing = false;
let stream = null;
let recStartTime = 0;
let recTimer = null;

// ========== 录音：点击开始 / 点击停止 ==========
recordBtn.addEventListener("click", e => {
  e.preventDefault();
  if (isProcessing) return;
  if (isRecording) {
    // 只有 MediaRecorder 真正在录音时才允许停止
    if (!mediaRecorder || mediaRecorder.state !== "recording") {
      return;
    }
    // 最短录音时长检查：小于 500ms 视为误触，忽略停止操作
    const elapsed = Date.now() - recStartTime;
    if (elapsed < 500) {
      return;
    }
    stopRec();
  } else {
    startRec();
  }
});

function startRec() {
  if (isProcessing || isRecording) return;
  isRecording = true;
  audioChunks = [];
  recStartTime = Date.now();

  $("recordBtn").classList.add("recording");
  $("hintText").textContent = "请求麦克风权限…";
  $("hintText").className = "hint";
  setStatus("请求权限…", false);

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(s => {
      stream = s;
      const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus" : "audio/webm";
      mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start();

      $("hintText").textContent = "点击停止并发送";
      $("hintText").className = "hint recording";
      setStatus("录音中…", true);

      // 计时
      startTimer();
    })
    .catch(err => {
      isRecording = false;
      const name = err.name || "";
      if (name === "NotAllowedError" || name === "PermissionDeniedError") {
        showToast("请在浏览器中允许麦克风权限");
      } else {
        showToast("无法访问麦克风: " + (err.message || "未知错误"));
      }
      resetRec();
    });
}

function stopRec() {
  if (!isRecording) return;
  isRecording = false;
  stopTimer();

  $("recordBtn").classList.remove("recording");
  $("hintText").textContent = "处理中…";

  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    // 等 ondataavailable 触发后再预览
    mediaRecorder.onstop = () => {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      showPreview();
    };
    mediaRecorder.stop();
  } else {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    showPreview();
  }
}

// ========== 计时器 ==========
function startTimer() {
  const btn = $("recordBtn");
  let el = btn.querySelector(".rec-time");
  if (!el) {
    el = document.createElement("span");
    el.className = "rec-time";
    btn.appendChild(el);
  }
  recTimer = setInterval(() => {
    const sec = Math.floor((Date.now() - recStartTime) / 1000);
    el.textContent = sec + '"';
    if (sec >= 30) stopRec();
  }, 200);
}

function stopTimer() {
  if (recTimer) { clearInterval(recTimer); recTimer = null; }
  const el = $("recordBtn").querySelector(".rec-time");
  if (el) el.remove();
}

// ========== 预览模式 ==========
let previewAudioUrl = null;
let previewAudio = null;

function showPreview() {
  const blob = new Blob(audioChunks, { type: "audio/webm" });
  if (blob.size < 2000) {
    showToast("录音太短了");
    resetRec();
    return;
  }

  const dur = Math.floor((Date.now() - recStartTime) / 1000);
  $("previewDuration").textContent = dur + '"';

  // 创建预览音频
  if (previewAudioUrl) URL.revokeObjectURL(previewAudioUrl);
  previewAudioUrl = URL.createObjectURL(blob);
  previewAudio = new Audio(previewAudioUrl);
  previewAudio.onended = () => {
    $("playPreviewBtn").textContent = "▶️";
    $("playPreviewBtn").classList.remove("playing");
  };

  $("recMode").classList.add("hidden");
  $("previewPanel").classList.add("show");
  $("hintText").textContent = "点击录音";
  $("hintText").className = "hint";
  setStatus("就绪", true);
}

function hidePreview() {
  if (previewAudio) { previewAudio.pause(); previewAudio = null; }
  if (previewAudioUrl) { URL.revokeObjectURL(previewAudioUrl); previewAudioUrl = null; }
  $("playPreviewBtn").textContent = "▶️";
  $("playPreviewBtn").classList.remove("playing");
  $("previewPanel").classList.remove("show");
  $("recMode").classList.remove("hidden");
}

$("playPreviewBtn").addEventListener("click", () => {
  if (!previewAudio) return;
  if (previewAudio.paused) {
    previewAudio.play();
    $("playPreviewBtn").textContent = "⏹";
    $("playPreviewBtn").classList.add("playing");
  } else {
    previewAudio.pause();
    previewAudio.currentTime = 0;
    $("playPreviewBtn").textContent = "▶️";
    $("playPreviewBtn").classList.remove("playing");
  }
});

$("cancelBtn").addEventListener("click", () => {
  hidePreview();
  resetRec();
});

$("sendBtn").addEventListener("click", () => {
  hidePreview();
  $("hintText").textContent = "🤔 识别中…";
  $("hintText").className = "hint processing";
  setStatus("识别中…", false);
  isProcessing = true;
  sendAudio();
});

// ========== 发送音频到服务器 ASR → Chat → TTS ==========
let currentUserAudioId = null;

function sendAudio() {
  const blob = new Blob(audioChunks, { type: "audio/webm" });
  if (blob.size < 2000) {
    showToast("录音太短了");
    resetRec();
    return;
  }

  const dur = Math.max(1, Math.min(30, Math.round((Date.now() - recStartTime) / 1000)));

  // 显示用户气泡（先占位）
  addBubble("self", dur, blob, "…");

  // 发到服务器 ASR
  fetch("/api/asr", {
    method: "POST",
    headers: { "Content-Type": "application/octet-stream" },
    body: blob
  })
  .then(r => {
    if (!r.ok) return r.json().then(e => { throw new Error(e.error || "ASR 失败") });
    return r.json();
  })
  .then(data => {
    const text = data.text || "（语音消息）";
    currentUserAudioId = data.audio_id || null;
    updateLastTranscript(text);
    // ASR 完成后调 AI 对话（传 audio_id 让服务器保存到历史）
    return fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, audio_id: currentUserAudioId })
    });
  })
  .then(r => {
    if (!r.ok) return r.json().then(e => { throw new Error(e.error || "对话失败") });
    return r.json();
  })
  .then(data => {
    const reply = data.text || "嗯，我在听。";
    doTTS(reply, dur);
  })
  .catch(err => {
    doTTS("嗯，我在听。", dur);
  });
}

function updateLastTranscript(text) {
  const bubbles = chatArea.querySelectorAll(".bubble.self");
  const last = bubbles[bubbles.length - 1];
  if (last) {
    const t = last.querySelector(".transcript");
    if (t) t.textContent = text;
  }
}

// ========== TTS ==========
function doTTS(text, userDur) {
  showThinking();
  // 立即恢复录音按钮可用
  resetRec();

  fetch("/api/tts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  })
  .then(r => {
    if (!r.ok) return r.json().then(e => { throw new Error(e.error || "TTS 失败") });
    return r.json();
  })
  .then(data => {
    hideThinking();
    const audioB64 = data.audio_data;
    const audioId = data.audio_id;

    // base64 转 blob
    const binaryStr = atob(audioB64);
    const bytes = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) {
      bytes[i] = binaryStr.charCodeAt(i);
    }
    const blob = new Blob([bytes], { type: "audio/mpeg" });

    const replyDur = calcDuration(blob);
    addBubble("other", replyDur, blob, text);

    // 保存 assistant 消息到历史（带 audio_id）
    fetch("/api/history/append", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ role: "assistant", content: text, audio_id: audioId })
    }).catch(() => {});
  })
  .catch(err => {
    hideThinking();
    showToast("语音合成失败: " + err.message);
  });
}

// ========== UI: 气泡 ==========
function addBubble(side, duration, audioBlob, transcript) {
  emptyState.style.display = "none";

  const bubble = document.createElement("div");
  bubble.className = "bubble " + side;

  if (audioBlob) {
    // 有音频：显示语音条
    const card = document.createElement("div");
    card.className = "voice-card";

    const speaker = document.createElement("span");
    speaker.className = "speaker";
    speaker.textContent = "🔊";

    const wave = document.createElement("div");
    wave.className = "wave";
    for (let i = 0; i < 4; i++) {
      const bar = document.createElement("span");
      bar.className = "bar";
      bar.style.height = (6 + Math.random() * 14) + "px";
      wave.appendChild(bar);
    }

    const durSpan = document.createElement("span");
    durSpan.className = "duration";
    durSpan.textContent = duration + '"';

    card.appendChild(speaker);
    card.appendChild(wave);
    card.appendChild(durSpan);

    const trans = document.createElement("div");
    trans.className = "transcript";
    trans.textContent = transcript || "";

    // 音频事件绑定
    const url = URL.createObjectURL(audioBlob);
    const audio = new Audio(url);
    card.dataset.audioUrl = url;

    audio.onended = () => { speaker.textContent = "🔊"; };
    audio.onplay = () => { speaker.textContent = "🔊"; };

    card.addEventListener("click", () => {
      if (audio.paused) { audio.play(); }
      else { audio.pause(); }
    });

    // 不自动播放，用户点击语音条才播放

    bubble.appendChild(card);
    bubble.appendChild(trans);
  } else {
    // 无音频：纯文本气泡
    const textBubble = document.createElement("div");
    textBubble.className = "voice-card";
    textBubble.style.padding = "8px 12px";
    textBubble.textContent = transcript || "";
    bubble.appendChild(textBubble);
  }

  chatArea.appendChild(bubble);
  chatArea.scrollTop = chatArea.scrollHeight;

  return bubble;
}

function showThinking() {
  const b = document.createElement("div");
  b.className = "bubble other";
  b.id = "thinkingBubble";
  b.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  chatArea.appendChild(b);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideThinking() {
  const el = document.getElementById("thinkingBubble");
  if (el) el.remove();
}

function showToast(msg) {
  const old = document.querySelector(".toast");
  if (old) old.remove();
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function resetRec() {
  isProcessing = false;
  $("hintText").textContent = "点击录音";
  $("hintText").className = "hint";
  setStatus("就绪", true);
}

function calcDuration(blob) {
  const sec = Math.round(blob.size / 6000);
  return Math.max(1, Math.min(99, sec));
}

function setStatus(text, ok) {
  $("statusText").textContent = text;
  $("statusDot").className = "dot" + (ok ? "" : " busy");
}

// ========== 新建对话 ==========
$("newChatBtn").addEventListener("click", () => {
  fetch("/api/reset", { method: "POST" })
    .then(r => {
      if (!r.ok) throw new Error("重置失败");
      return r.json();
    })
    .then(() => {
      // 清空聊天区域
      chatArea.innerHTML = '';
      chatArea.appendChild(emptyState);
      emptyState.style.display = "flex";
      showToast("✅ 已新建对话");
    })
    .catch(err => showToast("新建对话失败: " + err.message));
});

// ========== 设置弹窗 ==========
$("settingsBtn").addEventListener("click", () => {
  // 从服务器加载当前提示词
  fetch("/api/prompt")
    .then(r => r.json())
    .then(data => {
      $("promptInput").value = data.prompt || "";
      $("modalOverlay").classList.add("show");
    })
    .catch(() => showToast("加载提示词失败"));
});

function closeModal() {
  $("modalOverlay").classList.remove("show");
}

$("modalCloseBtn").addEventListener("click", closeModal);
$("modalCancelBtn").addEventListener("click", closeModal);
$("modalOverlay").addEventListener("click", e => {
  if (e.target === $("modalOverlay")) closeModal();
});

$("modalSaveBtn").addEventListener("click", () => {
  const prompt = $("promptInput").value.trim();
  if (!prompt) {
    showToast("提示词不能为空");
    return;
  }

  const btn = $("modalSaveBtn");
  btn.disabled = true;
  btn.textContent = "保存中…";

  fetch("/api/prompt", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt })
  })
  .then(r => {
    if (!r.ok) return r.json().then(e => { throw new Error(e.error || "保存失败") });
    return r.json();
  })
  .then(() => {
    showToast("✅ 提示词已保存，对话历史已重置");
    closeModal();
  })
  .catch(err => {
    showToast("保存失败: " + err.message);
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = "保存";
  });
});

// ========== 加载历史记录 ==========
function loadHistory() {
  fetch("/api/history")
    .then(r => r.json())
    .then(async history => {
      if (!Array.isArray(history) || history.length <= 1) return;

      // 先收集所有需要加载的音频，按顺序渲染
      for (let i = 1; i < history.length; i++) {
        const msg = history[i];
        const side = msg.role === "user" ? "self" : "other";

        if (msg.audio) {
          try {
            const resp = await fetch("/api/audio/" + msg.audio);
            const blob = await resp.blob();
            const dur = Math.round(blob.size / 6000);
            addBubble(side, Math.max(1, Math.min(99, dur)), blob, msg.content);
          } catch {
            addBubble(side, 0, null, msg.content);
          }
        } else {
          addBubble(side, 0, null, msg.content);
        }
      }
    })
    .catch(() => {});
}

// ========== Boot ==========
setStatus("就绪", true);
loadHistory();
</script>
